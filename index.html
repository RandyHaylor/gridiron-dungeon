<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>grid-A-Iron Dungeon</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- VT323 = IBM VT-style monochrome terminal font, the closest match to
     the 8086-era PC text-mode look. Already referenced in the CSS stack. -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&display=swap" />
<style>
  html,body { margin:0; padding:0; background:#111; color:#0f0;
              font-family: "VT323","Courier New",monospace; overflow:hidden;
              overscroll-behavior:none; touch-action:manipulation;
              display:flex; justify-content:center; align-items:flex-start;
              height:100%; width:100%; }
  /* Fixed portrait viewport: 400 logical x 700 logical. Aspect chosen so
     the width-fit and height-fit scales are roughly equal on iPhone-sized
     viewports — width fills, height has just enough headroom for the
     dynamic browser bottom bar. */
  /* Use outline (not border) so the green frame draws outside the box
     and doesn't shave 2px off the inner content area, which previously
     made the canvas overlap the right-side border. */
  #wrap { width:400px; height:700px; position:relative; background:#000;
          outline:1px solid #0a0;
          transform-origin: top left; }
  /* 3D area: 4:3 (400x300) at top, UI takes the remaining 400px below. */
  #game { position:absolute; left:0; top:0; width:400px; height:300px; overflow:hidden; }
  #game canvas { display:block; width:400px; height:300px; }
  /* Held-item HUD: anchored at the bottom of the 3D viewport, sprite
     pushed half off-screen so only the top peeks up (flame for torch,
     blade tip for sword). overflow:hidden on #game clips the rest.
     Doubled size from 96 -> 192. */
  .hand { position:absolute; bottom:-92px; width:192px; height:192px;
          pointer-events:none; image-rendering:pixelated; z-index:5; }
  .hand img { width:100%; height:100%; image-rendering:pixelated; display:block; }
  .hand.left  { left:0;    transform: rotate(-15deg); }
  .hand.right { right:0;   transform: rotate(20deg); }
  .hand[hidden]{ display:none; }
  /* Damage flash: full red veil over the 3D viewport, fades out fast. */
  #hitFlash { position:absolute; inset:0; background:rgba(220,30,30,0.55);
              pointer-events:none; opacity:0; z-index:8; }
  @keyframes hitFlashKf {
    0%   { opacity:0.6; }
    100% { opacity:0; }
  }
  #hitFlash.active { animation: hitFlashKf 360ms ease-out; }
  /* Big red damage number on player hit. */
  #playerDamageNum { position:absolute; left:0; right:0; top:30%;
                     text-align:center; font-size:84px; font-weight:bold;
                     color:#ff3030; pointer-events:none; opacity:0;
                     z-index:9; font-family:"VT323","Courier New",monospace;
                     text-shadow: 0 0 12px #800, 0 0 24px #400; }
  @keyframes playerDamageNumKf {
    0%   { opacity:1; transform:translateY(0); }
    100% { opacity:0; transform:translateY(-40px); }
  }
  #playerDamageNum.show { animation: playerDamageNumKf 700ms ease-out forwards; }
  /* Attack swing: slash sword down and in front (toward screen center)
     in combination with the camera yaw rotation, then snap back.
     Combined duration tracks the JS PLAYER_SWING_TOTAL_MS. */
  @keyframes attackSwingKf {
    0%   { transform: translate(0, 0)        rotate(20deg); }
    50%  { transform: translate(-70px,-40px) rotate(-65deg); }
    100% { transform: translate(0, 0)        rotate(20deg); }
  }
  .hand.right.attackSwing { animation: attackSwingKf 168ms ease-in-out; }
  #ui {
    position:absolute; left:0; top:300px; width:400px; height:400px;
    background:rgba(0,0,0,0.92); border-top:2px solid #0f0;
    padding:6px; box-sizing:border-box; font-size:14px; line-height:1.25;
    display:grid; grid-template-rows: 1fr auto auto; gap:6px;
  }
  #ui .panel { border:1px solid #0a0; padding:4px 6px; min-height:0; position:relative; }
  /* Status panel grid: two columns of stat lines. */
  #statusGrid { display:grid; grid-template-columns: 1fr 1fr; gap:2px 12px; font-size:14px; }
  /* Inventory overlay: covers all UI panels when shown.
     The [hidden] attribute on the element didn't take effect because
     `display:flex` overrides the user-agent `display:none`; we add
     an explicit higher-specificity rule to enforce hide. */
  #inventoryOverlay { position:absolute; left:0; right:0; top:0; bottom:0;
                       background:rgba(0,0,0,0.96); border-top:2px solid #0f0;
                       padding:10px; box-sizing:border-box; z-index:50;
                       display:flex; flex-direction:column; gap:6px; }
  #inventoryOverlay[hidden] { display:none !important; }
  /* Hamburger settings button: top-left of the wrap, always present
     above all other UI (below only the start screen / death overlay). */
  #hamburgerBtn { position:absolute; top:6px; left:6px; z-index:90;
                   background:rgba(0,0,0,0.65); color:#9f9;
                   border:1px solid #0a0; font-size:18px; line-height:1;
                   padding:4px 8px; cursor:pointer; }
  #settingsOverlay { position:absolute; left:0; right:0; top:0; bottom:0;
                      background:rgba(0,0,0,0.96); border-top:2px solid #0f0;
                      padding:12px; box-sizing:border-box; z-index:95;
                      display:flex; flex-direction:column; gap:10px;
                      font-family:"VT323","Courier New",monospace; }
  #settingsOverlay[hidden] { display:none !important; }
  #settingsHeader { color:#9f9; letter-spacing:1px;
                     border-bottom:1px solid #0a0; padding-bottom:4px; }
  #settingsOverlay .settings-row { display:flex; align-items:center;
                                    gap:8px; color:#cfc; font-size:16px; }
  #settingsOverlay .settings-row input[type=range] { flex:1; }
  /* Start screen with splash + volume sliders. Required user-gesture
     before any audio plays. */
  #startScreen { position:absolute; left:0; right:0; top:0; bottom:0;
                  background:#000; z-index:120; padding:14px;
                  box-sizing:border-box; display:flex; flex-direction:column;
                  align-items:center; justify-content:center; gap:14px;
                  font-family:"VT323","Courier New",monospace; }
  #startScreen[hidden] { display:none !important; }
  /* Text-only title on the start screen (no splash image). */
  #startTitle { text-align:center; line-height:1.05; }
  #startTitle .big { font-size:48px; color:#9bff9b;
                      text-shadow: 0 0 6px #060, 0 0 14px #030;
                      letter-spacing:2px; }
  #startTitle .sub { font-size:38px; color:#ffd34d;
                      text-shadow: 0 0 6px #420, 0 0 14px #210;
                      letter-spacing:6px; margin-top:4px; }
  #startScreen .vol-row { display:flex; align-items:center; gap:8px;
                           color:#cfc; font-size:16px; min-width:240px; }
  #startScreen .vol-row input[type=range] { flex:1; }
  #btnStartGame { font-size:22px; padding:10px 26px; background:#063;
                   color:#aaffaa; border:1px solid #0f6;
                   box-shadow: 0 0 6px #0f4 inset, 0 0 6px #0f4; }
  /* Vendor overlay: same shape as inventory; green accents to match
     the friendly NPC. */
  #vendorOverlay { position:absolute; left:0; right:0; top:0; bottom:0;
                    background:rgba(0,0,0,0.96); border-top:2px solid #0f0;
                    padding:10px; box-sizing:border-box; z-index:50;
                    display:flex; flex-direction:column; gap:6px; }
  #vendorOverlay[hidden] { display:none !important; }
  #vendorHeader { color:#9f9; letter-spacing:1px; border-bottom:1px solid #0a0; padding-bottom:4px; }
  #vendorItemList { flex:1; overflow:auto; }
  #vendorItemList .vendorRow { display:flex; align-items:center; gap:8px; padding:3px 0;
                                border-bottom:1px dashed #050; }
  /* Death overlay: covers the whole wrap (game + UI), fades to black,
     then message / stats / button fade in via cascading transitions. */
  #deathOverlay { position:absolute; inset:0; background:#000; z-index:80;
                  opacity:0; transition: opacity 1.4s ease-in;
                  display:flex; flex-direction:column; align-items:center;
                  justify-content:center; padding:20px; box-sizing:border-box;
                  color:#bca; gap:14px; pointer-events:none;
                  font-family: "VT323","Courier New",monospace; }
  #deathOverlay.active { opacity:0.97; pointer-events:auto; }
  #deathOverlay[hidden] { display:none !important; }
  #deathMsg { font-size:24px; color:#c66; text-align:center; opacity:0;
              transition: opacity 1.0s ease 1.4s; letter-spacing:1px; }
  #deathStats { font-size:16px; opacity:0;
                transition: opacity 1.0s ease 2.4s;
                text-align:left; min-width:240px; line-height:1.35; }
  #btnPlayAgain { font-size:18px; padding:8px 16px; opacity:0;
                  transition: opacity 1.0s ease 3.0s; }
  #deathOverlay.active #deathMsg,
  #deathOverlay.active #deathStats,
  #deathOverlay.active #btnPlayAgain { opacity:1; }
  #invHeader { color:#9f9; letter-spacing:1px; border-bottom:1px solid #0a0; padding-bottom:4px; }
  #invItemList { flex:1; overflow:auto; }
  #invItemList .invRow { display:flex; align-items:center; gap:8px; padding:3px 0;
                          border-bottom:1px dashed #050; }
  /* ROOM panel: discovered map fills the panel as a half-transparent
     backdrop; room text/items/log layer on top. */
  #roomPanel > #discoveredMap {
    position:absolute; inset:0; padding:4px 6px;
    opacity:0.45; pointer-events:none;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    margin:0 !important;
  }
  #roomPanel > #discoveredMap pre {
    margin:0; color:#cfc;
    /* fluid scale: line-height tight; size left to inline style */
  }
  #roomPanel > h3,
  #roomPanel > #roomDesc,
  #roomPanel > #itemList,
  #roomPanel > #log { position:relative; z-index:1; opacity:0.78; }
  /* Player arrow lives above the map but below the room text. */
  #playerArrowMarker {
    position:absolute; left:50%; top:50%;
    transform: translate(-50%, -50%) rotate(0deg);
    transition: transform 250ms ease-out;
    color:#bff5b0; font-family:'Courier New',monospace; font-size:22px;
    font-weight:bold; pointer-events:none; z-index:1;
    text-shadow: 0 0 4px rgba(120,255,120,0.6);
  }
  /* Buttons inside ROOM panel (item Take buttons) stay fully opaque so
     they remain readable/tappable. */
  #roomPanel > #itemList button { opacity:1; }
  #ui h3 { margin:0 0 3px 0; font-size:13px; color:#9f9; letter-spacing:1px; }

  /* Compact 2x3 symbol d-pad for movement / interaction. */
  .dpad { display:grid; grid-template-columns:1fr 1fr 1fr; gap:4px; }
  .dpad button { font-size:22px; padding:8px 0; line-height:1;
                 min-height:38px; }
  /* Door button uses a text label rather than a symbol — make it fit. */
  #btnDoor { font-size:13px; }
  /* Descend / Vendor buttons get the same green-glow pulse when usable. */
  #btnVendor.available,
  .dpad button.available {
    background:#063;
    color:#aaffaa;
    border-color:#0f6;
    box-shadow: 0 0 6px #0f4 inset, 0 0 6px #0f4;
    animation: descendPulse 1.2s ease-in-out infinite;
  }
  @keyframes descendPulse {
    0%,100% { box-shadow: 0 0 6px #0f4 inset, 0 0 5px #0f4; }
    50%     { box-shadow: 0 0 6px #0f4 inset, 0 0 14px #0f6; }
  }
  #ui h3 { margin:0 0 4px 0; font-size:16px; color:#9f9; letter-spacing:1px; }
  #log { font-size:12px; line-height:1.2; overflow:hidden; max-height:60px; }
  #log div { opacity:.95; }
  button { background:#020; color:#0f0; border:1px solid #0a0; font-family:inherit; font-size:16px;
           padding:4px 8px; margin:2px 2px 0 0; cursor:pointer; }
  button:hover { background:#040; }
  button:disabled { color:#050; border-color:#040; cursor:not-allowed; }
  #compass { position:absolute; top:6px; right:6px; background:rgba(0,0,0,.65);
             padding:4px; border:1px solid #0a0;
             display:flex; align-items:center; }
  #compassText { display:none; }
  #compassRose { width:42px; height:42px; position:relative; }
  #compassRose .ring { position:absolute; inset:0; border:1px solid #0a0; border-radius:50%; }
  #compassRose .needle {
    position:absolute; left:50%; top:50%; width:0; height:0;
    border-left:4px solid transparent; border-right:4px solid transparent;
    border-bottom:18px solid #ff4444;
    transform-origin: 50% 100%;
    transform: translate(-50%,-100%) rotate(0deg);
    transition: transform .15s ease-out;
    filter: drop-shadow(0 0 2px #f00);
  }
  #compassRose .tail {
    position:absolute; left:50%; top:50%; width:0; height:0;
    border-left:3px solid transparent; border-right:3px solid transparent;
    border-top:14px solid #888;
    transform-origin: 50% 0%;
    transform: translate(-50%,0%) rotate(0deg);
    transition: transform .15s ease-out;
  }
  #compassRose .lbl { position:absolute; font-size:9px; color:#9f9; }
  #compassRose .lN { top:0;    left:50%; transform:translate(-50%,-2px); }
  #compassRose .lS { bottom:0; left:50%; transform:translate(-50%,2px); }
  #compassRose .lE { top:50%;  right:0;  transform:translate(2px,-50%); }
  #compassRose .lW { top:50%;  left:0;   transform:translate(-2px,-50%); }
  #compassText { line-height:1.25; }
</style>
</head>
<body>
<div id="wrap">
<button id="hamburgerBtn" title="Settings" aria-label="Settings">&#9776;</button>
<div id="settingsOverlay" hidden>
  <div id="settingsHeader">SETTINGS <span style="font-size:11px;opacity:.7;">(Close to dismiss)</span></div>
  <div class="settings-row">Music
    <input type="range" id="settingsMusicVolSlider" min="0" max="1" step="0.01" value="0.25" />
  </div>
  <div class="settings-row">SFX
    <input type="range" id="settingsSfxVolSlider"   min="0" max="1" step="0.01" value="0.35" />
  </div>
  <button id="btnSettingsClose" style="margin-top:8px;">Close</button>
</div>
<div id="game">
  <!-- Held items: clipped against game viewport bottom so only the
       upper portion of the held sprite peeks up like a Doom-era HUD. -->
  <div class="hand left"><img src="sprites/item_torch.png" alt="torch" /></div>
  <div class="hand right" id="rightHand" hidden><img src="sprites/item_rusty_sword.png" alt="weapon" /></div>
  <!-- Red flash overlay: pulsed when an enemy hit lands. -->
  <div id="hitFlash"></div>
  <!-- Big red damage number when the player gets hit. -->
  <div id="playerDamageNum"></div>
</div>
<div id="compass">
  <div id="compassRose">
    <div class="ring"></div>
    <div class="lbl lN">N</div><div class="lbl lE">E</div>
    <div class="lbl lS">S</div><div class="lbl lW">W</div>
    <div class="needle" id="compassNeedle"></div>
    <div class="tail" id="compassTail"></div>
  </div>
  <div id="compassText"></div>
</div>
<div id="ui">
  <div class="panel" id="roomPanel">
    <div id="roomDesc">—</div>
    <div id="itemList"></div>
    <div id="log"></div>
    <div id="discoveredMap" style="margin-top:6px;"></div>
    <!-- Player arrow: centered overlay, rotates smoothly with facing,
         stays put while the discoveredMap pans under it. -->
    <div id="playerArrowMarker">^</div>
  </div>
  <div class="panel" id="combatPanel">
    <div id="statusGrid"></div>
    <div id="combatActions"></div>
    <div id="combatPanelButtons" style="margin-top:4px; display:flex; gap:6px; flex-wrap:wrap;">
      <button id="btnInventory">Inventory (I)</button>
      <button id="btnVendor" style="display:none;">Vendor (V)</button>
    </div>
  </div>
  <div id="deathOverlay" hidden>
    <div id="deathMsg">one more skeleton for my army...</div>
    <div id="deathStats"></div>
    <button id="btnPlayAgain">Play Again (Space)</button>
  </div>
  <div id="startScreen">
    <div id="startTitle">
      <div class="big">grid-A-Iron</div>
      <div class="sub">DUNGEON</div>
    </div>
    <div class="vol-row">Music
      <input type="range" id="musicVolSlider" min="0" max="1" step="0.01" value="0.25" />
    </div>
    <div class="vol-row">SFX
      <input type="range" id="sfxVolSlider"   min="0" max="1" step="0.01" value="0.35" />
    </div>
    <button id="btnStartGame">Enter Dungeon</button>
  </div>
  <div id="vendorOverlay" hidden>
    <div id="vendorHeader">VENDOR <span style="font-size:11px;opacity:.7;">(V or Close to dismiss)</span></div>
    <div id="vendorItemList"></div>
    <button id="btnVendorClose" style="margin-top:8px;">Close</button>
  </div>
  <div id="inventoryOverlay" hidden>
    <div id="invHeader">INVENTORY <span style="font-size:11px;opacity:.7;">(I or Close to dismiss)</span></div>
    <div id="invItemList"></div>
    <button id="btnInvClose" style="margin-top:8px;">Close</button>
  </div>
  <div class="panel" id="movePanel">
    <div class="dpad">
      <button id="btnLeft"   title="Turn left (A)">↺</button>
      <button id="btnFwd"    title="Forward (W)">↑</button>
      <button id="btnRight"  title="Turn right (D)">↻</button>
      <button id="btnDoor"   title="Open/close door (E)">Open Door (E)</button>
      <button id="btnBack"   title="Backward (S)">↓</button>
      <button id="btnStairs" title="Descend stairs (Space)">▼</button>
    </div>
  </div>
</div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// -------- constants --------
const N=0, E=1, S=2, W=3;
const DIR_NAMES = ['N','E','S','W'];
const DIR_VEC = [[0,-1],[1,0],[0,1],[-1,0]]; // dx,dy for N,E,S,W (y grows south)
const CELL = 4; // world units per room
const WALL_H = 3;

// -------- random --------
function rng(seed){ let s=seed>>>0; return ()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }
let R = rng(Date.now()&0xffffffff);
const ri = (n)=>Math.floor(R()*n);
const choice = (a)=>a[ri(a.length)];

// -------- dungeon generation --------
// Each cell has walls[4] where each is 'wall' | 'open' | 'door' (door has 'open' bool).
// We carve a maze via DFS, then convert some carved edges to doors, leave rest open. Outer = wall.
function makeLevel(level){
  const W_=8, H_=8;
  const cells = [];
  for(let y=0;y<H_;y++){
    const row=[];
    for(let x=0;x<W_;x++){
      row.push({
        x,y,
        walls:[{type:'wall'},{type:'wall'},{type:'wall'},{type:'wall'}],
        items:[], enemy:null, stairs:false, visited:false, seen:false
      });
    }
    cells.push(row);
  }
  const cellAt=(x,y)=> (x>=0&&y>=0&&x<W_&&y<H_)?cells[y][x]:null;

  // DFS maze
  const stack=[[ri(W_),ri(H_)]];
  cellAt(stack[0][0],stack[0][1]).visited=true;
  while(stack.length){
    const [x,y]=stack[stack.length-1];
    const opts=[];
    for(let d=0;d<4;d++){
      const nx=x+DIR_VEC[d][0], ny=y+DIR_VEC[d][1];
      const c=cellAt(nx,ny);
      if(c && !c.visited) opts.push(d);
    }
    if(!opts.length){ stack.pop(); continue; }
    const d=choice(opts);
    const nx=x+DIR_VEC[d][0], ny=y+DIR_VEC[d][1];
    const here=cellAt(x,y), there=cellAt(nx,ny);
    // 30% chance carve becomes a closed door; else open passage
    const isDoor = R()<0.3;
    here.walls[d] = isDoor ? {type:'door',open:false} : {type:'open'};
    there.walls[(d+2)%4] = isDoor ? {type:'door',open:false} : {type:'open'};
    there.visited=true;
    stack.push([nx,ny]);
  }

  // Add a few extra openings for loops
  for(let i=0;i<6;i++){
    const x=ri(W_), y=ri(H_), d=ri(4);
    const nx=x+DIR_VEC[d][0], ny=y+DIR_VEC[d][1];
    const a=cellAt(x,y), b=cellAt(nx,ny);
    if(!b) continue;
    if(a.walls[d].type==='wall'){
      a.walls[d]={type:'open'};
      b.walls[(d+2)%4]={type:'open'};
    }
  }

  // Place player far from stairs
  const px=ri(W_), py=ri(H_);
  let sx,sy;
  do { sx=ri(W_); sy=ri(H_); } while(Math.abs(sx-px)+Math.abs(sy-py) < 6);
  cellAt(sx,sy).stairs=true;

  // Exactly one sword and one shield per floor; tier gated by level.
  let swordToSpawn  = (level >= 6) ? 'Steel Sword'  : (level >= 4 ? 'Iron Sword'  : 'Rusty Sword');
  let shieldToSpawn = (level >= 6) ? 'Steel Shield' : (level >= 4 ? 'Iron Shield' : 'Rusty Shield');
  function placeUniqueFloorItem(name){
    for(let attempt=0; attempt<60; attempt++){
      const ix=ri(W_), iy=ri(H_);
      if(ix===px && iy===py) continue;
      const c = cellAt(ix,iy);
      if(!c || c.stairs) continue;
      c.items.push(name);
      return true;
    }
    return false;
  }
  placeUniqueFloorItem(swordToSpawn);
  placeUniqueFloorItem(shieldToSpawn);
  // Sprinkle other floor items (no swords/shields here).
  const itemsPool = ['Healing Herb','Gold (5gp)','Torch'];
  for(let i=0;i<5;i++){
    const c = cells[ri(H_)][ri(W_)];
    if(c.stairs) continue;
    c.items.push(choice(itemsPool));
  }

  // Sprinkle enemies (not in player's start cell, not on stairs).
  // Level-gated pool: skeletons L2+, cave trolls L4+, liches L6+.
  const enemiesPool = [
    {name:'Giant Rat',  hp:5,  atk:2, minLevel:1},
    {name:'Goblin',     hp:8,  atk:3, minLevel:1},
    {name:'Slime',      hp:6,  atk:2, minLevel:1},
    {name:'Skeleton',   hp:10, atk:4, minLevel:2},
    {name:'Cave Troll', hp:18, atk:4, minLevel:4},
    {name:'Lich',       hp:14, atk:7, minLevel:6},
  ];
  const eligibleEnemies = enemiesPool.filter(e => e.minLevel <= level);
  const enemyCount = 3 + level;
  for(let i=0;i<enemyCount;i++){
    const ex=ri(W_), ey=ri(H_);
    if(ex===px && ey===py) continue;
    const c=cellAt(ex,ey);
    if(c.enemy || c.stairs) continue;
    const t = choice(eligibleEnemies);
    c.enemy = { ...t, hpMax:t.hp };
  }

  // Vendor: only on even floors (2, 4, 6, ...). Placed in the 3x3
  // around the player's start cell, never on the start cell itself,
  // never on stairs, and not on any enemy cell.
  if(level % 2 === 0){
    const candidates = [];
    for(let dy=-1; dy<=1; dy++){
      for(let dx=-1; dx<=1; dx++){
        if(dx===0 && dy===0) continue;
        const vx = px+dx, vy = py+dy;
        if(vx<0 || vy<0 || vx>=W_ || vy>=H_) continue;
        const c = cellAt(vx, vy);
        if(!c || c.stairs || c.enemy) continue;
        candidates.push(c);
      }
    }
    if(candidates.length){
      const pick = candidates[ri(candidates.length)];
      pick.npc = { name: 'Vendor' };
    }
  }

  return { W_, H_, cells, px, py };
}

// -------- three.js scene --------
let scene, camera, renderer;
let dungeonGroup;

function initThree(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  // Fuzzy fog of war: starts close (slight dimming even in current room)
  // and reaches full black just past the BFS boundary (5x5 / Chebyshev<=2).
  // Camera-anchored so it moves smoothly in any direction.
  scene.fog = new THREE.Fog(0x000000, CELL * 0.5, CELL * 2.6);

  // 3D viewport: 4:3 (400x300), top of the layout — same on every device.
  const VIEW_W = 400, VIEW_H = 300;
  camera = new THREE.PerspectiveCamera(75, VIEW_W/VIEW_H, 0.05, 50);
  renderer = new THREE.WebGLRenderer({ antialias:false });
  renderer.setPixelRatio(1);
  renderer.setSize(VIEW_W, VIEW_H);
  document.getElementById('game').appendChild(renderer.domElement);

  const amb = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(amb);
  const torch = new THREE.PointLight(0xffaa66, 1.6, CELL*3, 2);
  torch.name='torch';
  scene.add(torch);
}

// ---- Texture/sprite loading from sprites/ folder ----
const TEX_LOADER = new THREE.TextureLoader();
function loadTilingTexture(path, repeat=1){
  const t = TEX_LOADER.load(path);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.magFilter = THREE.NearestFilter;
  t.minFilter = THREE.LinearMipMapLinearFilter;
  t.repeat.set(repeat, repeat);
  return t;
}
function loadSpriteTexture(path){
  const t = TEX_LOADER.load(path);
  t.magFilter = THREE.NearestFilter;
  t.minFilter = THREE.LinearFilter;
  return t;
}
const wallTex  = loadTilingTexture('sprites/tex_wall_dank_stone.png',    1);
const floorTex = loadTilingTexture('sprites/tex_floor_dirty_stone.png',  1);
const ceilTex  = loadTilingTexture('sprites/tex_ceiling_dark_stone.png', 1);

// Filename map for in-world sprites (enemies + items).
const ENEMY_SPRITE_PATH = {
  'Giant Rat':  'sprites/enemy_giant_rat.png',
  'Goblin':     'sprites/enemy_goblin.png',
  'Skeleton':   'sprites/enemy_skeleton.png',
  'Slime':      'sprites/enemy_slime.png',
  'Cave Troll': 'sprites/enemy_cave_troll.png',
  'Lich':       'sprites/enemy_lich.png',
};
const ITEM_SPRITE_PATH = {
  'Rusty Sword':  'sprites/item_rusty_sword.png',
  'Iron Sword':   'sprites/item_iron_sword.png',
  'Steel Sword':  'sprites/item_steel_sword.png',
  'Rusty Shield': 'sprites/item_rusty_shield.png',
  'Iron Shield':  'sprites/item_iron_shield.png',
  'Steel Shield': 'sprites/item_steel_shield.png',
  'Healing Herb': 'sprites/item_healing_herb.png',
  'Torch':        'sprites/item_torch.png',
};
function makeBillboardSprite(path, worldHeight){
  const m = new THREE.SpriteMaterial({ map:loadSpriteTexture(path), depthTest:true, transparent:true });
  const sp = new THREE.Sprite(m);
  sp.scale.set(worldHeight, worldHeight, 1);
  return sp;
}

const matWall = new THREE.MeshStandardMaterial({ map:wallTex, roughness:1 });
const matFloor = new THREE.MeshStandardMaterial({ map:floorTex, roughness:1 });
const matCeil = new THREE.MeshStandardMaterial({ map:ceilTex, roughness:1 });
const matDoorClosed = new THREE.MeshStandardMaterial({ color:0x884422, roughness:.7 });
const matDoorOpen = new THREE.MeshStandardMaterial({ color:0x000000, transparent:true, opacity:0 });
const matStairsDoor = new THREE.MeshStandardMaterial({ color:0x000000, emissive:0x000000 });
const matEnemy = new THREE.MeshStandardMaterial({ color:0xaa2222, emissive:0x440000 });
const matItem = new THREE.MeshStandardMaterial({ color:0xffcc33, emissive:0x664400 });

// Build only the visible rooms (current + next-in-front if passage is open)
function buildScene(){
  if(dungeonGroup) scene.remove(dungeonGroup);
  // Tear down any objects we parented directly to the scene root
  // (phrase bubbles, detached dying enemy meshes) so they don't leak
  // across level transitions and float over the new dungeon.
  if(scene){
    const stragglers = scene.children.filter(o => {
      const u = o.userData; return u && (u.isEnemyPhrase || u.isEnemy);
    });
    for(const o of stragglers){
      scene.remove(o);
      if(o.material){
        if(o.material.map && o.userData.isEnemyPhrase) o.material.map.dispose();
        // Don't dispose shared textures (enemy sprite atlas) — only the
        // canvas-generated phrase texture. Material dispose is safe here.
        try { o.material.dispose(); } catch(_){}
      }
      if(o.userData.ownerEnemy && o.userData.ownerEnemy.currentPhraseSprite === o){
        o.userData.ownerEnemy.currentPhraseSprite = null;
      }
    }
  }
  dungeonGroup = new THREE.Group();
  scene.add(dungeonGroup);
  renderVisibleRooms();
}

function cellAt(x,y){
  const d = state.dungeon;
  if(!d) return null;
  if(x<0||y<0||x>=d.W_||y>=d.H_) return null;
  return d.cells[y][x];
}

function passageOpenInFront(c, dir){
  if(!c) return false;
  const w = c.walls[dir];
  if(w.type==='open') return true;
  if(w.type==='door' && w.open) return true;
  return false;
}

function renderVisibleRooms(){
  while(dungeonGroup.children.length) dungeonGroup.remove(dungeonGroup.children[0]);
  const p = state.player;
  const here = cellAt(p.x,p.y);
  if(!here) return;

  // Visibility: BFS from player's cell, only crossing edges that are
  // passable (open passage OR open door), limited to a 3x3 neighborhood
  // (Chebyshev distance <= 1). This means up to 3 rooms in front when a
  // straight hallway opens up, plus side-rooms reachable by going around
  // a corner one step. Pre-rendering the wider set means rotation /
  // forward animations have geometry already in place (no black flash).
  // Mark the player's own cell as seen (you're physically in it).
  here.seen = true;
  // Mark the cell directly in front as seen ONLY if there's an open
  // passage or open door between you and it (you can see straight ahead).
  // Side and diagonal cells are NOT auto-marked even if reachable —
  // walking into them is what reveals them.
  if(passageOpenInFront(here, p.dir)){
    const fx = p.x + DIR_VEC[p.dir][0];
    const fy = p.y + DIR_VEC[p.dir][1];
    const front = cellAt(fx, fy);
    if(front) front.seen = true;
  }
  // 3D rendering still uses the wider 3x3-around-player BFS through open
  // edges — that pre-loads geometry so rotation/move tweens have rooms
  // to fly through. This does NOT mark cells as seen.
  const queue = [{cx:p.x, cy:p.y}];
  const visited = new Set([`${p.x},${p.y}`]);
  while(queue.length){
    const {cx,cy} = queue.shift();
    const c = cellAt(cx,cy);
    if(!c) continue;
    drawRoom(c, cx, cy);
    for(let d=0; d<4; d++){
      if(!passageOpenInFront(c,d)) continue;
      const nx = cx + DIR_VEC[d][0], ny = cy + DIR_VEC[d][1];
      const key = `${nx},${ny}`;
      if(visited.has(key)) continue;
      // Render up to Chebyshev <= 2 (5x5 around player) so the cells you're
      // facing don't suddenly drop out when you take a single step backward;
      // the outer ring stays under heavy fog and visually dissolves.
      if(Math.abs(nx - p.x) > 2 || Math.abs(ny - p.y) > 2) continue;
      visited.add(key);
      queue.push({cx:nx, cy:ny});
    }
  }
  if(!state.anim){
    setCameraToCellAndDir(p.x, p.y, p.dir);
  }
  // Move torch with player
  const torch = scene.getObjectByName('torch');
  if(torch) torch.position.copy(camera.position);
}

function drawRoom(c, gx, gy){
  const ox = gx*CELL, oz = gy*CELL;
  // floor
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(CELL,CELL), matFloor);
  floor.rotation.x = -Math.PI/2;
  floor.position.set(ox+CELL/2, 0, oz+CELL/2);
  dungeonGroup.add(floor);
  // ceiling
  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(CELL,CELL), matCeil);
  ceil.rotation.x = Math.PI/2;
  ceil.position.set(ox+CELL/2, WALL_H, oz+CELL/2);
  dungeonGroup.add(ceil);
  // 4 walls (N=-z, E=+x, S=+z, W=-x)
  for(let d=0;d<4;d++){
    drawWall(c.walls[d], d, ox, oz, c);
  }
  // stairs marker (black door with down arrow on north wall if cell has stairs)
  if(c.stairs){
    drawStairsMarker(ox,oz);
  }
  // items: PNG billboard sprites (fallback to glowing box for unknown names)
  c.items.forEach((name, idx)=>{
    const spread = (c.items.length>1) ? 0.7 : 0;
    const ang = (idx / Math.max(c.items.length,1)) * Math.PI*2;
    const ix = ox+CELL/2 + Math.cos(ang)*spread;
    const iz = oz+CELL/2 + Math.sin(ang)*spread;
    const path = ITEM_SPRITE_PATH[name];
    if(path){
      const sp = makeBillboardSprite(path, 0.7);
      sp.position.set(ix, 0.45, iz);
      dungeonGroup.add(sp);
    } else {
      const itm = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4), matItem);
      itm.position.set(ix, 0.25, iz);
      dungeonGroup.add(itm);
    }
    const lbl = makeTextSprite(name);
    lbl.position.set(ix, 0.95, iz);
    dungeonGroup.add(lbl);
  });
  // enemy: a red upright box; if this is the player's cell push it toward
  // the wall the player is facing so player + enemy each have a wall behind.
  if(c.enemy){
    let ex = ox+CELL/2, ez = oz+CELL/2;
    if(gx === state.player.x && gy === state.player.y){
      const ev = DIR_VEC[state.player.dir];
      ex += ev[0] * CELL * 0.35;
      ez += ev[1] * CELL * 0.35;
    }
    const path = ENEMY_SPRITE_PATH[c.enemy.name];
    let eObj;
    if(path){
      eObj = makeBillboardSprite(path, 1.6);
      eObj.position.set(ex, 0.85, ez);
    } else {
      eObj = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.6,0.5), matEnemy);
      eObj.position.set(ex, 0.8, ez);
    }
    eObj.userData.isEnemy = true;
    eObj.userData.baseY = eObj.position.y;
    eObj.userData.bobPhase = Math.random() * Math.PI * 2;
    eObj.userData.cellX = gx;
    eObj.userData.cellY = gy;
    eObj.userData.enemyRef = c.enemy;
    // Phrase sprites are parented to the scene root (not this mesh), so
    // they survive a renderVisibleRooms rebuild and don't need to be
    // cleared here.
    dungeonGroup.add(eObj);
  }
  // Friendly NPC (vendor) — same billboard treatment, no combat.
  if(c.npc){
    const path = NPC_SPRITE_PATH[c.npc.name];
    let nObj;
    if(path){
      nObj = makeBillboardSprite(path, 1.6);
      nObj.position.set(ox+CELL/2, 0.85, oz+CELL/2);
    } else {
      nObj = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.6,0.5),
        new THREE.MeshStandardMaterial({color:0x55cc55, emissive:0x114411}));
      nObj.position.set(ox+CELL/2, 0.8, oz+CELL/2);
    }
    nObj.userData.isNpc   = true;
    nObj.userData.baseY   = nObj.position.y;
    nObj.userData.bobPhase = Math.random()*Math.PI*2;
    nObj.userData.cellX   = gx;
    nObj.userData.cellY   = gy;
    nObj.userData.npcRef  = c.npc;
    dungeonGroup.add(nObj);
  }
}

function drawWall(w, dir, ox, oz, c){
  // Wall plane positioned at the appropriate side of cell
  let cx=ox+CELL/2, cz=oz+CELL/2, rotY=0, dx=0, dz=0;
  if(dir===N){ dz=-CELL/2; rotY=0; }
  if(dir===S){ dz=+CELL/2; rotY=Math.PI; }
  if(dir===E){ dx=+CELL/2; rotY=-Math.PI/2; }
  if(dir===W){ dx=-CELL/2; rotY=Math.PI/2; }
  const px=cx+dx, pz=cz+dz;

  if(w.type==='wall'){
    const m = new THREE.Mesh(new THREE.PlaneGeometry(CELL, WALL_H), matWall);
    m.position.set(px, WALL_H/2, pz); m.rotation.y = rotY;
    dungeonGroup.add(m);
  } else if(w.type==='door'){
    // doorway frame (top) and door panel
    const frame = new THREE.Mesh(new THREE.PlaneGeometry(CELL, WALL_H*0.25), matWall);
    frame.position.set(px, WALL_H*0.875, pz); frame.rotation.y=rotY;
    dungeonGroup.add(frame);
    if(!w.open){
      const door = new THREE.Mesh(new THREE.PlaneGeometry(CELL*0.6, WALL_H*0.75), matDoorClosed);
      door.position.set(px, WALL_H*0.375, pz); door.rotation.y=rotY;
      dungeonGroup.add(door);
    }
    // side fillers
    const filler1 = new THREE.Mesh(new THREE.PlaneGeometry(CELL*0.2, WALL_H*0.75), matWall);
    const filler2 = filler1.clone();
    const ax = (rotY===0||Math.abs(rotY)===Math.PI) ? CELL*0.4 : 0;
    const az = (rotY===0||Math.abs(rotY)===Math.PI) ? 0 : CELL*0.4;
    filler1.position.set(px-ax, WALL_H*0.375, pz-az); filler1.rotation.y=rotY;
    filler2.position.set(px+ax, WALL_H*0.375, pz+az); filler2.rotation.y=rotY;
    dungeonGroup.add(filler1, filler2);
  } else {
    // open passage: render nothing — just a clear opening between rooms.
  }
}

// ----- camera pose helpers (kept identical between snap and tween) -----
const PLAYER_BACK_OFFSET = CELL * 0.4;
function cameraPosForCellAndDir(cx, cy, dir){
  const v = DIR_VEC[dir];
  return new THREE.Vector3(
    cx*CELL + CELL/2 - v[0]*PLAYER_BACK_OFFSET,
    WALL_H*0.55,
    cy*CELL + CELL/2 - v[1]*PLAYER_BACK_OFFSET
  );
}
// Yaw such that camera (default forward = -Z) ends up looking along DIR_VEC[dir].
function yawForDir(dir){
  const v = DIR_VEC[dir];
  return Math.atan2(-v[0], -v[1]);
}
function setCameraToCellAndDir(cx, cy, dir){
  const pos = cameraPosForCellAndDir(cx, cy, dir);
  camera.position.copy(pos);
  camera.rotation.set(0, yawForDir(dir), 0);
  const torch = scene.getObjectByName('torch');
  if(torch) torch.position.copy(pos);
}
// Choose the shortest signed delta between two yaws (radians).
function shortestYawDelta(from, to){
  let d = (to - from) % (Math.PI*2);
  if(d >  Math.PI) d -= Math.PI*2;
  if(d < -Math.PI) d += Math.PI*2;
  return d;
}
function smoothstep(t){ return t*t*(3 - 2*t); }

function makeTextSprite(text, opts){
  opts = opts || {};
  const borderColor = opts.borderColor || '#0f0';
  const textColor   = opts.textColor   || '#bfffbf';
  const padX=12, padY=8;
  const cv = document.createElement('canvas');
  const ctx = cv.getContext('2d');
  const font = 'bold 36px "Courier New", monospace';
  ctx.font = font;
  const metrics = ctx.measureText(text);
  cv.width  = Math.ceil(metrics.width) + padX*2;
  cv.height = 48 + padY*2;
  // redo because resizing canvas resets ctx
  const c2 = cv.getContext('2d');
  c2.font = font;
  if(!opts.noBackground){
    c2.fillStyle = 'rgba(0,0,0,0.7)';
    c2.fillRect(0,0,cv.width,cv.height);
  }
  if(!opts.noBorder){
    c2.strokeStyle = borderColor;
    c2.lineWidth = 2;
    c2.strokeRect(1,1,cv.width-2,cv.height-2);
  }
  c2.fillStyle = textColor;
  c2.textBaseline = 'middle';
  c2.fillText(text, padX, cv.height/2);
  const tex = new THREE.CanvasTexture(cv);
  tex.minFilter = THREE.LinearFilter;
  // depthTest:true so walls/doors occlude the label like a real object.
  const mat = new THREE.SpriteMaterial({ map:tex, depthTest:true, transparent:true });
  const sp = new THREE.Sprite(mat);
  // Halved from previous size — labels were dominating the frame.
  const scale = 0.007;
  sp.scale.set(cv.width*scale, cv.height*scale, 1);
  return sp;
}

// Lazily-loaded stairs-down floor texture (top-down hatch sprite).
let _stairsTexCached = null;
function getStairsDownTexture(){
  if(_stairsTexCached) return _stairsTexCached;
  const t = TEX_LOADER.load('sprites/floor_stairs_down.png');
  t.magFilter = THREE.NearestFilter;
  t.minFilter = THREE.LinearFilter;
  _stairsTexCached = t;
  return t;
}
function drawStairsMarker(ox, oz){
  // Flat floor plane with the stairs-down sprite, sitting just above the
  // floor mesh to avoid z-fighting.
  const tex = getStairsDownTexture();
  const mat = new THREE.MeshStandardMaterial({
    map: tex, transparent: true, roughness: 1, side: THREE.DoubleSide
  });
  const stairs = new THREE.Mesh(new THREE.PlaneGeometry(CELL*0.85, CELL*0.85), mat);
  stairs.rotation.x = -Math.PI/2;
  stairs.position.set(ox + CELL/2, 0.02, oz + CELL/2);
  dungeonGroup.add(stairs);

  // Bobbing green down-arrow cone hovering over the hatch.
  const arrow = new THREE.Mesh(
    new THREE.ConeGeometry(0.32, 0.55, 6),
    new THREE.MeshStandardMaterial({ color:0x33ff33, emissive:0x115511 })
  );
  arrow.rotation.x = Math.PI; // point down
  arrow.position.set(ox + CELL/2, 1.0, oz + CELL/2);
  arrow.userData.isStairsArrow = true;
  arrow.userData.baseY = arrow.position.y;
  arrow.userData.bobPhase = Math.random() * Math.PI * 2;
  dungeonGroup.add(arrow);

  // Floating 'Descend' label above the arrow.
  const label = makeTextSprite('Descend');
  label.position.set(ox + CELL/2, 1.55, oz + CELL/2);
  label.userData.isStairsLabel = true;
  label.userData.baseY = label.position.y;
  label.userData.bobPhase = arrow.userData.bobPhase;
  dungeonGroup.add(label);
}

// -------- gameplay actions --------
function tryMoveForward(){
  if(state.anim){ state.pendingAction = tryMoveForward; return; }
  if(state.combat){ log("You can't run blindly — you're in combat. Use Run."); return; }
  const p = state.player;
  const here = cellAt(p.x,p.y);
  if(!passageOpenInFront(here,p.dir)){
    const w = here.walls[p.dir];
    if(w.type==='door' && !w.open) log("A door blocks your path. Open it first.");
    // Walls just silently refuse — no log spam when bumping a wall.
    return;
  }
  const fromPos = cameraPosForCellAndDir(p.x, p.y, p.dir);
  p.x += DIR_VEC[p.dir][0];
  p.y += DIR_VEC[p.dir][1];
  cellAt(p.x, p.y).seen = true;
  const toPos = cameraPosForCellAndDir(p.x, p.y, p.dir);
  state.anim = {
    kind:'move', startTs: performance.now(), durMs: ANIM_DURATION_MS,
    fromPos, toPos, fromYaw: yawForDir(p.dir), toYaw: yawForDir(p.dir),
    fromCellX: p.x - DIR_VEC[p.dir][0], fromCellY: p.y - DIR_VEC[p.dir][1],
    toCellX:   p.x,                     toCellY:   p.y,
    onDone: ()=>{ log(`You step forward into a new room.`); enterCell(); }
  };
  playSfx('footstep');
  renderVisibleRooms();
}

function enterCell(){
  const c = cellAt(state.player.x, state.player.y);
  state.stats.visitedKeys.add(`${state.level}:${state.player.x}:${state.player.y}`);
  if(c.enemy){
    state.combat = { enemy: c.enemy, cellRef: c };
    log(`A ${c.enemy.name} blocks the way! (HP ${c.enemy.hp}/${c.enemy.hpMax})`);
  } else if(c.npc){
    log(`A ${c.npc.name} greets you. Press V to trade.`);
  }
  renderVisibleRooms();
  refreshUI();
}

// Step backward one cell (no facing change). If we land in a cell that
// already has an enemy, chain a 180° spin animation onto the back-step so
// the player ends up facing the threat before combat starts.
function tryMoveBackward(){
  if(state.anim){ state.pendingAction = tryMoveBackward; return; }
  if(state.combat){ log("You can't back up in combat. Use Run."); return; }
  const p = state.player;
  const back = (p.dir + 2) % 4;
  const here = cellAt(p.x, p.y);
  if(!passageOpenInFront(here, back)){
    const w = here.walls[back];
    if(w.type==='door' && !w.open) log("A door is shut behind you.");
    // Walls behind: silent, same rule as forward.
    return;
  }
  const fromPos = cameraPosForCellAndDir(p.x, p.y, p.dir);
  p.x += DIR_VEC[back][0];
  p.y += DIR_VEC[back][1];
  cellAt(p.x, p.y).seen = true;
  const toPos = cameraPosForCellAndDir(p.x, p.y, p.dir);
  state.anim = {
    kind:'move', startTs: performance.now(), durMs: ANIM_DURATION_MS,
    fromPos, toPos, fromYaw: yawForDir(p.dir), toYaw: yawForDir(p.dir),
    fromCellX: p.x - DIR_VEC[back][0], fromCellY: p.y - DIR_VEC[back][1],
    toCellX:   p.x,                    toCellY:   p.y,
    onDone: ()=>{
      log("You step backward.");
      const here2 = cellAt(p.x, p.y);
      if(here2.enemy){
        // Chain a 180° spin animation; combat starts after the spin.
        const oldDir = p.dir;
        const oldYaw = yawForDir(oldDir);
        const oldPosePos = cameraPosForCellAndDir(p.x, p.y, oldDir);
        p.dir = (p.dir + 2) % 4;
        const newYaw = oldYaw + shortestYawDelta(oldYaw, yawForDir(p.dir));
        const newPosePos = cameraPosForCellAndDir(p.x, p.y, p.dir);
        renderVisibleRooms(); // redraw with new dir so the enemy mesh re-offsets toward the new facing wall
        state.anim = {
          kind:'rotate', startTs: performance.now(), durMs: ANIM_DURATION_MS,
          fromPos: oldPosePos, toPos: newPosePos,
          fromYaw: oldYaw, toYaw: newYaw,
          onDone: ()=>{ log("You whirl around to face the threat!"); enterCell(); }
        };
      } else {
        enterCell();
      }
    }
  };
  playSfx('footstep');
  renderVisibleRooms();
}

function rotate(delta){
  if(state.anim){ state.pendingAction = ()=>rotate(delta); return; }
  if(state.combat){ log("Not while fighting!"); return; }
  const p = state.player;
  const oldDir = p.dir;
  const fromYaw = yawForDir(oldDir);
  p.dir = ((p.dir + delta) % 4 + 4) % 4;
  const toYaw = fromYaw + shortestYawDelta(fromYaw, yawForDir(p.dir));
  // Rotate the camera-offset vector AROUND the cell center over time, so
  // the camera traces an arc (constant radius from center), not a chord
  // that cuts through the middle of the room and back out — that produced
  // the "zigzag through center" feel.
  state.anim = {
    kind:'rotate-arc',
    startTs: performance.now(), durMs: ANIM_DURATION_MS,
    cellCenterX: p.x*CELL + CELL/2,
    cellCenterZ: p.y*CELL + CELL/2,
    fromYaw, toYaw,
    onDone: ()=>{ refreshUI(); }
  };
  // Render with new dir so any newly-visible next-ahead room is in scene
  // during the spin. anim is set, so camera won't be snapped.
  renderVisibleRooms();
  refreshUI();
}

function toggleDoor(){
  const p = state.player;
  const here = cellAt(p.x,p.y);
  const w = here.walls[p.dir];
  if(w.type !== 'door'){ log("There's no door in front of you."); return; }
  w.open = !w.open;
  // mirror on other side
  const nx=p.x+DIR_VEC[p.dir][0], ny=p.y+DIR_VEC[p.dir][1];
  const other = cellAt(nx,ny);
  if(other) other.walls[(p.dir+2)%4].open = w.open;
  playSfx('door');
  log(w.open ? "You open the door. It groans on rusty hinges." : "You shut the door.");
  renderVisibleRooms();
  refreshUI();
}

function descendStairs(){
  const c = cellAt(state.player.x, state.player.y);
  if(!c.stairs){ log("No stairs here."); return; }
  playSfx('descend_stairs');
  state.level++;
  log(`You descend deeper into the dungeon...`);
  newLevel(state.level);
}

// Weapons table: name -> attack value. Anything in here is treated as a weapon
// (only one carried at a time; picking a new one drops the current onto the floor).
const WEAPON_STATS = {
  'Fists':       1,
  'Rusty Sword': 3,
  'Iron Sword':  5,
  'Steel Sword': 7,
};
// Consumables table: name -> use(player) function returning a log line.
// Each use removes one of the item from inventory.
const CONSUMABLES = {
  'Healing Herb': (p)=>{
    const before = p.hp;
    p.hp = Math.min(p.hpMax, p.hp + 8);
    state.stats.herbsEaten += 1;
    return `You eat a Healing Herb. HP +${p.hp - before} (now ${p.hp}/${p.hpMax}).`;
  }
};
// Optional guards: if guard returns a string, the consumable is NOT consumed
// and the string is logged instead. Lets us refuse to waste a herb at full HP.
const CONSUMABLE_GUARDS = {
  'Healing Herb': (p)=>{
    if(p.hp >= p.hpMax) return "You're too healthy to waste a healing herb...";
    return null;
  }
};
// Shields table: name -> damage reduction (subtracted from incoming hits).
// Same single-slot rules as weapons: picking up a different shield drops
// the previous one onto the floor.
const SHIELD_STATS = {
  'Rusty Shield': 1,
  'Iron Shield':  2,
  'Steel Shield': 3,
};

function pickUpItem(idx){
  // In combat, picking up something costs your action.
  if(state.combat && state.combatBusy) return;
  const c = cellAt(state.player.x, state.player.y);
  const item = c.items.splice(idx,1)[0];
  if(item.startsWith('Gold')){
    const m = item.match(/(\d+)/);
    const g = m? parseInt(m[1]):0;
    state.player.gold += g;
    state.stats.goldCollected += g;
    playSfx('gold_collect');
    log(`You pocket ${g}gp.`);
  } else if(WEAPON_STATS.hasOwnProperty(item)){
    const old = state.player.weapon;
    state.player.weapon = { name:item, atk:WEAPON_STATS[item] };
    if(old.name !== 'Fists'){
      c.items.push(old.name);
      log(`You wield ${item} (atk ${WEAPON_STATS[item]}); you drop your ${old.name}.`);
    } else {
      log(`You wield ${item} (atk ${WEAPON_STATS[item]}).`);
    }
  } else if(SHIELD_STATS.hasOwnProperty(item)){
    const old = state.player.shield;
    state.player.shield = { name:item, dr:SHIELD_STATS[item] };
    if(old.name !== 'None'){
      c.items.push(old.name);
      log(`You strap on ${item} (dmg-reduction ${SHIELD_STATS[item]}); you drop your ${old.name}.`);
    } else {
      log(`You strap on ${item} (dmg-reduction ${SHIELD_STATS[item]}).`);
    }
  } else {
    state.player.inv.push(item);
    if(item === 'Healing Herb') playSfx('herb_collect');
    log(`You pick up: ${item}.`);
  }
  renderVisibleRooms();
  refreshUI();
  // If in combat, picking the item up was your action → enemy retaliates.
  if(state.combat){
    state.combatBusy = true;
    enemyTurn();
  }
}

// -------- combat --------
// Player hit chance is 75% on every attack.
const PLAYER_HIT_CHANCE = 0.75;

function triggerAttackSwingAnimation(){
  playSfx('sword_swing');
  // Camera yaw bob and sword down-and-forward swing run in combination,
  // started at the same instant — no raise/hold/lower phasing.
  const rh = document.getElementById('rightHand');
  if(rh && !rh.hidden){
    rh.classList.remove('attackSwing');
    void rh.offsetWidth; // force reflow so re-adding restarts the animation
    rh.classList.add('attackSwing');
  }
  state.attackSwing = { startTs: performance.now(), durMs: ATTACK_SWING_DURATION_MS };
}

function combatAttack(){
  if(state.dead) return;
  if(state.combatBusy) return;        // ignore while previous attack-turn is in flight
  if(!state.combat) return;
  state.combatBusy = true;
  const e = state.combat.enemy;
  triggerAttackSwingAnimation();
  // Pre-roll the player swing now (so the damage text in the eventual
  // log feels matched to this swing), but defer applying it and the
  // enemy turn until the player's full attack animation finishes.
  const playerHit = R() < PLAYER_HIT_CHANCE;
  const playerDmg = playerHit ? (1 + ri(state.player.weapon.atk)) : 0;
  // Schedule the enemy red-tint flash at the peak of the rotation (mid-swing)
  // so the visual hit lands when the sword visually does.
  if(playerHit){
    const peakDelayMs = Math.floor(PLAYER_SWING_TOTAL_MS * 0.5);
    setTimeout(()=>{
      const cellRef = state.combat && state.combat.cellRef;
      if(!cellRef) return;
      const enemyObj = findEnemySpriteForCell(cellRef.x, cellRef.y);
      if(enemyObj){
        flashEnemyHurtTint(enemyObj);
        spawnFloatingDamageNumberAboveEnemy(playerDmg, enemyObj);
        playSfx('damage_dealt');
      }
    }, peakDelayMs);
  }
  setTimeout(()=>{
    if(!state.combat || state.combat.enemy !== e) return;
    if(playerHit){
      e.hp -= playerDmg;
      state.stats.damageDealt += playerDmg;
      log(`You strike the ${e.name} for ${playerDmg}.`);
      if(e.hp <= 0){
        state.stats.enemiesKilled += 1;
        log(`The ${e.name} crumples to the floor!`);
        const cellRef = state.combat.cellRef;
        // Loot drop: 50/50 gold or herb, dropped into the cell's
        // items list so the player can Take it.
        const drop = (Math.random() < 0.5) ? 'Gold (5gp)' : 'Healing Herb';
        cellRef.items.push(drop);
        log(`It drops ${drop}.`);
        state.combat = null;
        state.combatBusy = false;
        const dyingObj = findEnemySpriteForCell(cellRef.x, cellRef.y);
        // Tear down any active phrase bubble for this enemy first; the
        // phrase tick only processes enemies still inside dungeonGroup
        // and the dying mesh is about to be detached to scene root.
        if(e.currentPhraseSprite){
          scene.remove(e.currentPhraseSprite);
          if(e.currentPhraseSprite.material){
            if(e.currentPhraseSprite.material.map) e.currentPhraseSprite.material.map.dispose();
            e.currentPhraseSprite.material.dispose();
          }
          e.currentPhraseSprite = null;
        }
        if(dyingObj){
          // Detach the dying mesh from dungeonGroup and re-parent it to
          // the scene root, so a renderVisibleRooms triggered by player
          // movement (or any re-render) won't yank it out and won't
          // re-create a fresh full-color enemy in its place. Clear
          // cell.enemy immediately so future renders skip the cell.
          dungeonGroup.remove(dyingObj);
          scene.add(dyingObj);
          cellRef.enemy = null;
          playEnemyDeathAnimation(dyingObj, ()=>{
            scene.remove(dyingObj);
            if(dyingObj.material){
              if(dyingObj.material.map) dyingObj.material.map.dispose();
              dyingObj.material.dispose();
            }
            refreshUI();
          });
        } else {
          cellRef.enemy = null;
          renderVisibleRooms();
        }
        refreshUI();
        return;
      }
    } else {
      log(`You swing at the ${e.name} and miss!`);
    }
    enemyTurn();
  }, PLAYER_SWING_TOTAL_MS);
}
function combatRun(){
  if(!state.combat) return;
  // 60% chance to run back to where we came from
  if(R() < 0.6){
    const p = state.player;
    const back = (p.dir+2)%4;
    const here = cellAt(p.x,p.y);
    if(passageOpenInFront(here,back)){
      p.x += DIR_VEC[back][0]; p.y += DIR_VEC[back][1];
      log("You scramble back the way you came!");
      state.combat = null;
      renderVisibleRooms();
      refreshUI();
      return;
    }
    log("Nowhere to run — your back is to a wall!");
  } else {
    log("You stumble trying to run!");
  }
  enemyTurn();
}
// Enemy hit chance: level 1 enemies hit 50% of the time. Higher levels
// scale up by +5% per level, capped at 90%.
function enemyHitChance(){
  return Math.min(0.9, 0.5 + 0.05 * Math.max(0, state.level - 1));
}

function enemyTurn(){
  const e = state.combat && state.combat.enemy;
  if(!e) return;
  const willHit = R() < enemyHitChance();
  const raw = 1 + ri(e.atk);
  const dr = state.player.shield.dr;
  const dmg = willHit ? Math.max(0, raw - dr) : 0;

  const applyAtPeak = ()=>{
    if(!willHit){
      log(`The ${e.name} lunges and misses!`);
      refreshUI();
      return;
    }
    state.player.hp -= dmg;
    if(dmg > 0){
      state.stats.damageTaken += dmg;
      const now = performance.now();
      state.screenShake = {
        startTs: now, until: now + SCREEN_SHAKE_DURATION_MS,
        durMs: SCREEN_SHAKE_DURATION_MS, magnitude: SCREEN_SHAKE_MAGNITUDE
      };
      const f = document.getElementById('hitFlash');
      if(f){
        f.classList.remove('active');
        void f.offsetWidth;
        f.classList.add('active');
      }
      showPlayerDamageNumberHud(dmg);
      playSfx('damage_taken');
    }
    if(dr > 0 && dmg < raw){
      log(`The ${e.name} hits you for ${dmg} (your ${state.player.shield.name} blocked ${raw - dmg}).`);
    } else {
      log(`The ${e.name} hits you for ${dmg}.`);
    }
    if(state.player.hp <= 0){
      log("You die in the dark.");
      triggerPlayerDeath();
    }
    refreshUI();
  };

  // Find the enemy sprite for the current combat cell to lunge it. If
  // we can't (rare — geometry not visible), fall through to immediate.
  const cellRef = state.combat.cellRef;
  const enemyObj = findEnemySpriteForCell(cellRef.x, cellRef.y);
  const onLungeDone = ()=>{ state.combatBusy = false; };
  if(enemyObj){
    startEnemyLungeAnimation(enemyObj, applyAtPeak, onLungeDone);
  } else {
    applyAtPeak();
    onLungeDone();
  }
}

// -------- UI --------
function log(msg){
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.textContent = '> ' + msg;
  el.prepend(d);
  while(el.children.length>6) el.removeChild(el.lastChild);
}

// Discovered top-down map of the whole level. Unseen cells = ' ',
// seen cells = '.', player cell = facing arrow ^>v<.
// Stairs marked 'X' once seen.
// Each cell renders as a 3-wide x 3-tall block sharing edges with neighbors:
//   + - +
//   | . |
//   + - +
// where corners are '+', wall H is '-', wall V is '|', closed door H is '=',
// closed door V is '"', and open passage / open door is a blank.
// Cell interior is the player arrow, 'X' for stairs, '.' for plain seen room,
// ' ' for unseen.
function buildDiscoveredLevelAsciiMap(){
  const d = state.dungeon, p = state.player;
  const arrow = ['^','>','v','<'][p.dir];
  const cols=d.W_, rows=d.H_;
  const gw = cols*2+1, gh = rows*2+1;
  const g = Array.from({length:gh}, ()=> Array(gw).fill(' '));
  const wallH = (w)=> w.type==='wall' ? '-' : w.type==='door' ? (w.open ? ' ' : '=') : ' ';
  const wallV = (w)=> w.type==='wall' ? '|' : w.type==='door' ? (w.open ? ' ' : '"') : ' ';
  let minRow=rows, maxRow=-1, minCol=cols, maxCol=-1;
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const c = d.cells[y][x];
      if(!c.seen) continue;
      if(y<minRow) minRow=y; if(y>maxRow) maxRow=y;
      if(x<minCol) minCol=x; if(x>maxCol) maxCol=x;
      const cx = x*2+1, cy = y*2+1;
      g[cy-1][cx-1] = '+'; g[cy-1][cx+1] = '+';
      g[cy+1][cx-1] = '+'; g[cy+1][cx+1] = '+';
      g[cy-1][cx] = wallH(c.walls[N]);
      g[cy+1][cx] = wallH(c.walls[S]);
      g[cy][cx-1] = wallV(c.walls[W]);
      g[cy][cx+1] = wallV(c.walls[E]);
      // Player char is drawn as a separate centered overlay that rotates
      // smoothly with facing direction; here we just mark stairs.
      if(c.stairs)                 g[cy][cx] = 'X';
      else                         g[cy][cx] = ' ';
    }
  }
  // Always return the full-level grid (no bounding-box trim) so callers
  // can translate it by exact ch/em units to keep the player centered.
  return g.map(r => r.join('')).join('\n');
}

// Top-down 5x5 ASCII of current room. Walls show as #, open passage as ' ',
// closed door as +, open door as . . Player @ in center, arrow shows facing.
function roomAsciiMap(c, dir){
  const sym = (w)=> w.type==='wall' ? '#'
                  : w.type==='door' ? (w.open ? '.' : '+')
                  : ' ';
  const arrow = ['^','>','v','<'][dir];
  const N_ = sym(c.walls[N]);
  const S_ = sym(c.walls[S]);
  const E_ = sym(c.walls[E]);
  const W_ = sym(c.walls[W]);
  const lines = [
    `#${'#'}${N_}${'#'}#`,
    `#   #`,
    `${W_}  ${arrow}  ${E_}`.replace(/\s+/, m=>m).slice(0,5),
    `#   #`,
    `#${'#'}${S_}${'#'}#`,
  ];
  // Build line 3 carefully (5 chars wide): W . arrow . E
  lines[2] = `${W_} ${arrow} ${E_}`;
  return lines.join('\n');
}

function updateRightHandSprite(){
  const rh = document.getElementById('rightHand');
  if(!rh) return;
  const wname = state.player.weapon.name;
  if(wname === 'Fists'){
    rh.hidden = true;
    return;
  }
  const path = ITEM_SPRITE_PATH[wname];
  if(!path){ rh.hidden = true; return; }
  const img = rh.querySelector('img');
  if(img.getAttribute('src') !== path) img.setAttribute('src', path);
  rh.hidden = false;
}

// Cumulative angle (in degrees) for the player arrow overlay so we
// always rotate the SHORT way between cardinal directions. CSS
// transition handles the smoothing visually.
let playerArrowAngleDeg = 0;
function updatePlayerArrowRotation(){
  const m = document.getElementById('playerArrowMarker');
  if(!m) return;
  // Map direction index (N,E,S,W) -> cardinal degrees with 0 = arrow pointing up.
  const targetByDir = [0, 90, 180, 270];
  const target = targetByDir[state.player.dir];
  // Shortest signed delta in degrees, mod 360.
  let delta = ((target - playerArrowAngleDeg) % 360 + 540) % 360 - 180;
  playerArrowAngleDeg = playerArrowAngleDeg + delta;
  m.style.transform = `translate(-50%, -50%) rotate(${playerArrowAngleDeg}deg)`;
}

// Translate the discovered-map <pre> so that the cell at (visX, visY)
// in continuous cell coords sits at the panel's visual center. Called
// every render frame so the map pans smoothly during a move animation.
function updateDiscoveredMapTranslate(visX, visY){
  const pre = document.getElementById('discoveredMapPre');
  if(!pre || !state.dungeon) return;
  const playerMapCol = visX * 2 + 1;
  const playerMapRow = visY * 2 + 1;
  const mapGw = state.dungeon.W_ * 2 + 1;
  const mapGh = state.dungeon.H_ * 2 + 1;
  const dxCh = (mapGw / 2) - playerMapCol - 0.5;
  const dyEm = (mapGh / 2) - playerMapRow - 0.5;
  pre.style.transform = `translate(${dxCh}ch, ${dyEm}em)`;
}

function refreshUI(){
  const p = state.player;
  const c = cellAt(p.x,p.y);
  updateRightHandSprite();
  updatePlayerArrowRotation();
  // Compass: rotate red needle to point in player's facing dir.
  // CSS rotation: needle base points up (= North). N=0deg, E=90, S=180, W=270.
  const dirDeg = [0,90,180,270][p.dir];
  document.getElementById('compassNeedle').style.transform =
    `translate(-50%,-100%) rotate(${dirDeg}deg)`;
  document.getElementById('compassTail').style.transform =
    `translate(-50%,0%) rotate(${dirDeg}deg)`;
  // Compact HUD top-right: rose + 3 short stat lines.
  document.getElementById('compassText').innerHTML =
    `Lv ${state.level}<br>(${p.x},${p.y})<br>Face ${DIR_NAMES[p.dir]}`;
  // The discovered map renders as a half-transparent backdrop behind the
  // ROOM info text. We render the full level once per refreshUI; the
  // <pre>'s translate is updated every frame in updateDiscoveredMapTranslate
  // so the player's character (^>v<) stays centered and the map pans
  // smoothly during move animations.
  document.getElementById('discoveredMap').innerHTML =
    `<pre id="discoveredMapPre" style="margin:0;color:#cfc;font-size:18px;line-height:1.0;` +
    `font-family:'Courier New',monospace;">${buildDiscoveredLevelAsciiMap()}</pre>`;
  updateDiscoveredMapTranslate(state.player.x, state.player.y);

  // room panel
  let desc = `You stand in a stone chamber.`;
  if(c.stairs) desc += ` In the center: a black portal etched with a downward arrow.`;
  const wf = c.walls[p.dir];
  desc += `\nAhead: ${wf.type==='wall' ? 'solid wall' : wf.type==='door' ? (wf.open?'open doorway':'closed door') : 'open passage'}.`;
  document.getElementById('roomDesc').textContent = desc;

  const itemList = document.getElementById('itemList');
  itemList.innerHTML = '';
  c.items.forEach((it,i)=>{
    const b = document.createElement('button');
    b.textContent = (i===0 ? `Take (T): ${it}` : `Take: ${it}`);
    b.onclick = ()=> pickUpItem(i);
    itemList.appendChild(b);
  });

  // status / combat panel
  // Status panel: two-column grid. Inventory line lives in the overlay,
  // accessed via the Inventory (I) button beneath this grid.
  document.getElementById('statusGrid').innerHTML =
    `<div>HP ${p.hp}/${p.hpMax}</div><div>Gold ${p.gold}</div>` +
    `<div>Wpn: ${p.weapon.name} (atk ${p.weapon.atk})</div>` +
    `<div>Shld: ${p.shield.name} (DR ${p.shield.dr})</div>`;

  const ca = document.getElementById('combatActions');
  ca.innerHTML = '';
  if(state.combat){
    const e = state.combat.enemy;
    const t = document.createElement('div');
    t.textContent = `In combat with ${e.name} (HP ${e.hp}/${e.hpMax})`;
    ca.appendChild(t);
    const ba = document.createElement('button'); ba.textContent='Attack (F)'; ba.onclick=combatAttack;
    const bf = document.createElement('button'); bf.textContent='Run (R)'; bf.onclick=combatRun;
    ca.append(ba,bf);
  }

  // movement buttons enable/disable
  document.getElementById('btnFwd').disabled = !!state.combat;
  document.getElementById('btnLeft').disabled = !!state.combat;
  document.getElementById('btnRight').disabled = !!state.combat;
  document.getElementById('btnDoor').disabled = !!state.combat || (c.walls[p.dir].type!=='door');
  const stairsBtn = document.getElementById('btnStairs');
  stairsBtn.disabled = !c.stairs || !!state.combat;
  stairsBtn.classList.toggle('available', !!c.stairs && !state.combat);
  const vendorBtn = document.getElementById('btnVendor');
  if(vendorBtn){
    vendorBtn.style.display = c.npc ? '' : 'none';
    vendorBtn.classList.toggle('available', !!c.npc && !state.combat);
  }
}

// -------- death sequence --------
function triggerPlayerDeath(){
  if(state.dead) return;
  state.dead = true;
  state.deathStartTs = performance.now();
  fadeOutMusicThenPlayDeathSting();
  state.combat = null;
  state.combatBusy = false;
  state.pendingAction = null;
  // Hide all enemy sprites so they don't appear to tilt with the camera
  // during the death pitch-down (sprites always billboard to the camera,
  // which produced the "enemy rotating with player" look).
  if(dungeonGroup){
    for(const obj of dungeonGroup.children){
      if(obj.userData && obj.userData.isEnemy) obj.visible = false;
    }
  }
  if(scene){
    const phraseSprites = scene.children.filter(o => o.userData && o.userData.isEnemyPhrase);
    for(const sp of phraseSprites){
      scene.remove(sp);
      if(sp.material){
        if(sp.material.map) sp.material.map.dispose();
        sp.material.dispose();
      }
      if(sp.userData.ownerEnemy) sp.userData.ownerEnemy.currentPhraseSprite = null;
    }
  }
  // Render stats summary into the overlay.
  const s = state.stats;
  const stats = document.getElementById('deathStats');
  stats.innerHTML =
    `<div>Gold collected: ${s.goldCollected}</div>` +
    `<div>Enemies killed: ${s.enemiesKilled}</div>` +
    `<div>Damage dealt:   ${s.damageDealt}</div>` +
    `<div>Damage taken:   ${s.damageTaken}</div>` +
    `<div>Herbs eaten:    ${s.herbsEaten}</div>` +
    `<div>Rooms explored: ${s.visitedKeys.size}</div>` +
    `<div>Final dungeon level: ${state.level}</div>`;
  const ov = document.getElementById('deathOverlay');
  ov.hidden = false;
  void ov.offsetWidth;
  ov.classList.add('active');
  // Pin the red flash so the last-damage tint persists into the fade-to-black.
  const hf = document.getElementById('hitFlash');
  if(hf){
    hf.classList.remove('active');
    hf.style.animation = 'none';
    hf.style.opacity = '0.55';
  }
}

// Movement keys auto-repeat at our own rate so the player isn't blocked
// by the OS's initial keydown-repeat delay. Other keys fire once per
// physical press (no auto-repeat).
const KEY_REPEAT_INTERVAL_MS = 260; // a hair longer than ANIM_DURATION_MS
const REPEAT_KEYS = new Set([
  'w','W','a','A','s','S','d','D',
  'ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
  'f','F'   // hold-to-attack
]);
const heldRepeatingKeys = new Set();

function dispatchKeyAction(key){
  // When dead, only Space restarts the run; everything else is locked.
  if(state.dead){
    if(key === ' ') restartGameAfterDeath();
    return;
  }
  if(key==='w'||key==='W'||key==='ArrowUp')         tryMoveForward();
  else if(key==='s'||key==='S'||key==='ArrowDown')  tryMoveBackward();
  else if(key==='a'||key==='A'||key==='ArrowLeft')  rotate(-1);
  else if(key==='d'||key==='D'||key==='ArrowRight') rotate(+1);
  else if(key==='e'||key==='E') toggleDoor();
  else if(key===' ') descendStairs();
  else if(key==='t'||key==='T'){
    const c = cellAt(state.player.x, state.player.y);
    if(c.items.length) pickUpItem(0);
    else log("Nothing on the floor here.");
  }
  else if(key==='f'||key==='F'){
    if(state.combat) combatAttack();
    else triggerAttackSwingAnimation();
  }
  else if(key==='r'||key==='R'){
    if(state.combat) combatRun();
    else log("Nothing to run from.");
  }
  else if(key==='i'||key==='I'){
    toggleInventoryOverlay();
  }
  else if(key==='h'||key==='H'){
    if(state.player.inv.includes('Healing Herb')) useConsumableByName('Healing Herb');
    else log("No Healing Herb to use.");
  }
  else if(key==='v'||key==='V'){
    toggleVendorOverlay();
  }
}

window.addEventListener('keydown', (e)=>{
  // Ignore OS-driven repeats; we handle our own repeat below.
  if(e.repeat) return;
  dispatchKeyAction(e.key);
  if(!REPEAT_KEYS.has(e.key)) return;
  if(heldRepeatingKeys.has(e.key)) return;
  heldRepeatingKeys.add(e.key);
  const fireRepeat = ()=>{
    if(!heldRepeatingKeys.has(e.key)) return;
    dispatchKeyAction(e.key);
    setTimeout(fireRepeat, KEY_REPEAT_INTERVAL_MS);
  };
  // First repeat fires after the same interval — no OS-style 500ms wait.
  setTimeout(fireRepeat, KEY_REPEAT_INTERVAL_MS);
});

window.addEventListener('keyup', (e)=>{
  heldRepeatingKeys.delete(e.key);
});

window.addEventListener('blur', ()=>{
  heldRepeatingKeys.clear();
});

// Scale the fixed 400x800 wrap to fit the *visible* viewport (the
// visualViewport API gives us the real area on iOS Safari/Chrome where the
// dynamic bottom bar otherwise eats into innerHeight). Same layout on all
// platforms — we only zoom the whole thing.
function fitWrapToViewport(){
  const el = document.getElementById('wrap');
  if(!el) return;
  const vv = window.visualViewport;
  const vw = vv ? vv.width  : window.innerWidth;
  const vh = vv ? vv.height : window.innerHeight;
  const scale = Math.min(vw/400, vh/700);
  el.style.transform = `scale(${scale})`;
  // Lock body to the visible area so iOS doesn't expose dead space below.
  document.body.style.height = vh + 'px';
  document.body.style.width  = vw + 'px';
}
window.addEventListener('resize', fitWrapToViewport);
window.addEventListener('orientationchange', fitWrapToViewport);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', fitWrapToViewport);
  window.visualViewport.addEventListener('scroll', fitWrapToViewport);
}

let audioMusicEl     = null;

function pickRandomMusicTrack(){
  return MUSIC_TRACKS[Math.floor(Math.random()*MUSIC_TRACKS.length)];
}
function startBackgroundMusic(){
  if(audioMusicEl){
    try { audioMusicEl.pause(); } catch(_){}
  }
  audioMusicEl = new Audio(pickRandomMusicTrack());
  audioMusicEl.volume = audioMusicVolume;
  audioMusicEl.onended = ()=>{ if(audioStarted) startBackgroundMusic(); };
  audioMusicEl.play().catch(()=>{});
}
function setMusicVolume(v){
  audioMusicVolume = v;
  if(audioMusicEl) audioMusicEl.volume = v;
}
function setSfxVolume(v){

}
// Quickly fade out background music, then fire the death sting once
// it's silent. Used by triggerPlayerDeath so the music doesn't fight
// the sting cue.
function fadeOutMusicThenPlayDeathSting(){
  const startVol = audioMusicEl ? audioMusicEl.volume : 0;
  const fadeDurMs = 350;
  const startTs = performance.now();
  const tick = ()=>{
    const t = (performance.now() - startTs) / fadeDurMs;
    if(!audioMusicEl || t >= 1){
      if(audioMusicEl){
        audioMusicEl.volume = 0;
        try { audioMusicEl.pause(); } catch(_){}
        // Stop the auto-pick-next on ended.
        audioMusicEl.onended = null;
      }
      playSfx('death_sting');
      return;
    }
    audioMusicEl.volume = startVol * (1 - t);
    requestAnimationFrame(tick);
  };
  tick();
}
function playSfx(category){
  if(!audioStarted) return;
  const list = SFX_BANK[category];
  if(!list || !list.length) return;
  const path = list[Math.floor(Math.random()*list.length)];
  try {
    const a = new Audio(path);
    a.volume = audioSfxVolume;
    a.play().catch(()=>{});
  } catch(_){}
}

// start appearing once the JSON arrives. No-op if it can't be fetched.

function tickAnimation(now){
  const a = state.anim;
  if(!a) return;
  const t = Math.min(1, (now - a.startTs) / a.durMs);
  const e = smoothstep(t);
  if(a.kind === 'rotate-arc'){
    // The back-offset vector rotates around the cell center along an arc.
    // Three.js camera default forward = -Z; rotated by yaw around Y, the
    // back-from-camera direction is (sin yaw, 0, cos yaw).
    const yaw = a.fromYaw + (a.toYaw - a.fromYaw) * e;
    camera.position.set(
      a.cellCenterX + Math.sin(yaw) * PLAYER_BACK_OFFSET,
      WALL_H * 0.55,
      a.cellCenterZ + Math.cos(yaw) * PLAYER_BACK_OFFSET
    );
    camera.rotation.set(0, yaw, 0);
  } else {
    camera.position.lerpVectors(a.fromPos, a.toPos, e);
    const yaw = a.fromYaw + (a.toYaw - a.fromYaw) * e;
    camera.rotation.set(0, yaw, 0);
  }
  const torch = scene.getObjectByName('torch');
  if(torch) torch.position.copy(camera.position);
  if(t >= 1){
    const done = a.onDone;
    state.anim = null;
    if(done) done();
    // Fire any queued action only after the full animation chain settles
    // (e.g. back-step into-enemy-room queues a 180 spin in onDone, so
    // wait until that finishes too before draining the buffer).
    if(!state.anim && state.pendingAction){
      const next = state.pendingAction;
      state.pendingAction = null;
      next();
    }
  }
}

// Per-frame ambient bob for enemies, the stairs-down arrow, and its label.
// Skips an enemy that's currently driven by the lunge animation.
function bobEnemiesInPlace(now){
  if(!dungeonGroup) return;
  const w = (Math.PI * 2) / ENEMY_BOB_PERIOD_MS;
  const lungeEnemy = state.enemyLunge ? state.enemyLunge.enemyObj : null;
  dungeonGroup.children.forEach(obj=>{
    const u = obj.userData;
    if(!u || typeof u.baseY !== 'number') return;
    if(u.isEnemy || u.isNpc){
      if(obj === lungeEnemy) return;
      if(u.dying) return;
      obj.position.y = u.baseY + Math.sin(now*w + u.bobPhase) * ENEMY_BOB_AMPLITUDE;
    } else if(u.isStairsArrow || u.isStairsLabel){
      obj.position.y = u.baseY + Math.sin(now*w + u.bobPhase) * 0.18;
    }
  });
}

// Find the sprite/mesh for the enemy in the given grid cell, if visible.
function findEnemySpriteForCell(cellX, cellY){
  if(!dungeonGroup) return null;
  for(const obj of dungeonGroup.children){
    const u = obj.userData;
    if(u && u.isEnemy && u.cellX === cellX && u.cellY === cellY) return obj;
  }
  return null;
}

// Enemy attack lunge: moves enemy ~ENEMY_LUNGE_DEPTH world units toward
// the player camera then back over ENEMY_LUNGE_DURATION_MS. Fires onPeak
// at the closest point (t=0.5), and onDone when the lunge fully retracts.
function startEnemyLungeAnimation(enemyObj, onPeak, onDone){
  const basePos = enemyObj.position.clone();
  // Direction "toward player" = opposite of player's facing dir vector.
  const v = DIR_VEC[state.player.dir];
  const peakPos = basePos.clone();
  peakPos.x -= v[0] * ENEMY_LUNGE_DEPTH;
  peakPos.z -= v[1] * ENEMY_LUNGE_DEPTH;
  state.enemyLunge = {
    startTs: performance.now(),
    durMs: ENEMY_LUNGE_DURATION_MS,
    enemyObj, basePos, peakPos,
    peakFired: false,
    onPeak: onPeak || null,
    onDone: onDone || null
  };
}

// Shared cross-enemy list of comical lines. 10% of every phrase emission
// gets pulled from this instead of the enemy's own library, popped from
// a per-enemy randomized copy that refreshes when emptied.
const FUNNY_SHARED_PHRASES = [
  "Is it break time yet?",
